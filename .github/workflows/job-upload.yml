name: job-upload

on:
  push:
    branches: [main]
    paths:
      - '*/**.md'
      - '!README.md'
      - '!**/README.md'
      - '!.github/**'
      - '!config/**'
      - '!template/**'

permissions:
  contents: read

jobs:
  notify-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 신규 추가된 md 파일만 감지
        id: detect
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep '\.md$' | grep -v '^README\|^\.github\|^config\|^template' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "신규 md 파일 없음 (수정만 있는 경우 알림 생략)"
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "신규 파일 감지: $NEW_FILES"
            echo "has_new=true" >> $GITHUB_OUTPUT
            FILES_JOINED=$(echo "$NEW_FILES" | tr '\n' '|')
            echo "files=$FILES_JOINED" >> $GITHUB_OUTPUT
          fi

      - name: #study-weekly 업로드 인증 알림
        if: steps.detect.outputs.has_new == 'true'
        env:
          TEAMS_WEBHOOK_WEEKLY: ${{ secrets.TEAMS_WEBHOOK_WEEKLY }}
          NEW_FILES: ${{ steps.detect.outputs.files }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          PUSHER: ${{ github.actor }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_WEEKLY" ]; then
            echo "ERROR: TEAMS_WEBHOOK_WEEKLY secret 없음"
            exit 1
          fi

          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          files_raw = os.environ['NEW_FILES']
          files = [f for f in files_raw.split('|') if f.strip()]
          repo = os.environ['GITHUB_REPOSITORY']
          sha = os.environ['GITHUB_SHA'][:7]
          pusher = os.environ['PUSHER']
          webhook_url = os.environ['TEAMS_WEBHOOK_WEEKLY']

          file_blocks = []
          for f in files:
            parts = f.split('/')
            member = parts[0] if len(parts) > 1 else pusher
            filename = parts[-1]
            github_url = f"https://github.com/{repo}/blob/main/{f}"
            file_blocks.append({
              "type": "TextBlock",
              "text": f"📄 [{member}] [{filename}]({github_url})",
              "wrap": True
            })

          payload = {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.2",
                "body": [
                  {
                    "type": "TextBlock",
                    "text": "✅ 새 자료가 업로드됐어요!",
                    "weight": "Bolder",
                    "size": "Medium"
                  },
                  *file_blocks,
                  {
                    "type": "TextBlock",
                    "text": f"commit: `{sha}`",
                    "isSubtle": True,
                    "size": "Small"
                  }
                ]
              }
            }]
          }

          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(
            webhook_url,
            data=data,
            headers={'Content-Type': 'application/json'},
            method='POST'
          )

          try:
            with urllib.request.urlopen(req, timeout=10) as resp:
              print(f"#study-weekly 알림 전송 완료 (HTTP {resp.status})")
          except urllib.error.HTTPError as e:
            print(f"ERROR: 전송 실패 (HTTP {e.code})")
            raise
          PYEOF
